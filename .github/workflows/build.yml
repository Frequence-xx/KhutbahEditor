name: Build
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
  workflow_dispatch:                           # manual trigger for integration tests
  schedule:
    - cron: '0 2 * * *'                        # nightly integration run at 02:00 UTC
  release: { types: [created] }

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit tests (${{ matrix.os }})
    strategy:
      matrix:
        os: [macos-14, windows-2022, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 8                          # 300s shell timeout × 2 layers + buffer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install Node deps
        run: npm ci
      - name: Install Python pipeline (dev)
        working-directory: python-pipeline
        shell: bash
        run: |
          python -m venv .venv
          if [ "${{ runner.os }}" = "Windows" ]; then source .venv/Scripts/activate; else source .venv/bin/activate; fi
          pip install -e ".[dev]"
      - name: Build Electron (main + preload)
        run: npm run build:electron
        shell: bash
      - name: ESM smoke gate — verify main.js resolves all relative imports
        shell: bash
        run: |
          node --input-type=module -e "import('./dist-electron/main.js').then(() => console.log('ESM OK')).catch(e => { if (e.code === 'ERR_MODULE_NOT_FOUND') { console.error(e.message); process.exit(1); } console.log('ESM OK (electron not available outside runtime)'); })"
      - name: Lint (ESLint)
        run: npm run lint
        timeout-minutes: 1
        shell: bash
      - name: TypeScript tests (Vitest, unit only, 5-minute hard cap)
        run: npm test
        timeout-minutes: 5
        shell: bash
      - name: Python tests (Pytest, unit only, 5-minute hard cap)
        working-directory: python-pipeline
        timeout-minutes: 5
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then source .venv/Scripts/activate; else source .venv/bin/activate; fi
          pytest -m "not integration"
      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.os }}
          path: |
            tests/reports/
            python-pipeline/tests/reports/
            playwright-report/
          retention-days: 14

  integration-tests:
    name: Integration tests (Linux only, on-demand + nightly)
    runs-on: ubuntu-22.04
    timeout-minutes: 30                         # Whisper model download + inference
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: npm ci
      - name: Install Python pipeline (dev)
        working-directory: python-pipeline
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -e ".[dev]"
      - name: Fetch resources (FFmpeg + yt-dlp + Whisper model)
        run: bash resources/fetch-resources.sh Linux x64
      - name: Run integration tests (real FFmpeg + Whisper)
        working-directory: python-pipeline
        timeout-minutes: 25
        run: |
          source .venv/bin/activate
          # Integration tests run real Whisper inference; 5+ min is normal.
          # 25-minute step cap is more than 5x the 5-min framework cap; intentional exception
          # to AGENTS.md's 300s suite policy because Whisper inference is the unavoidable cost.
          pytest -m integration
      - name: Upload integration artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: python-pipeline/tests/reports/
          retention-days: 14

  package:
    needs: unit-tests
    if: github.event_name == 'release'
    permissions:
      contents: write   # for softprops/action-gh-release@v2
    strategy:
      matrix:
        include:
          - os: macos-13
            arch: x64
          - os: macos-14
            arch: arm64
          - os: windows-2022
            arch: x64
          - os: ubuntu-22.04
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: npm ci
      - name: Build pipeline binary
        working-directory: python-pipeline
        shell: bash
        run: |
          python -m venv .venv
          if [ "${{ runner.os }}" = "Windows" ]; then source .venv/Scripts/activate; else source .venv/bin/activate; fi
          pip install -e ".[dev]"
          pyinstaller --noconfirm khutbah_pipeline.spec
      - name: Fetch resources
        shell: bash
        run: bash resources/fetch-resources.sh ${{ runner.os }} ${{ matrix.arch }}
      - name: Build app
        run: npm run package -- --${{ matrix.arch }}
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
